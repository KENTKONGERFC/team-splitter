<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Football Team Splitter</title>

<style>

body{
    font-family: Arial;
    background:#f5f7fa;
    margin:40px;
}

.container{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    color:#1f4e79;
}

button{
    background:#1f4e79;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1f4e79;
    color:white;
    padding:10px;
}

td{
    padding:8px;
    border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
