<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Football Team Splitter</title>

<link
rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>
  
<head>
<title>Add Player</title>
</head>

<body>

<h1>Add Player</h1>

<form method="post">

Name

<br>

<input
type="text"
name="name"
required>

<br><br>

Position

<br>

<select name="position">

<option value="keeper">
Keeper
</option>

<option value="defence">
Defence
</option>

<option value="attack">
Attack
</option>

<option value="both">
Both
</option>

</select>

<br><br>

Skill

<br>

<input
type="number"
name="skill"
min="1"
max="9"
required>

<br><br>

<button type="submit">
Save
</button>

</form>

<br>

<a href="/players">
Back
</a>

</body>
</html>
